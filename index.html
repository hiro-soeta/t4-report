<!doctype html>
<html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"><title>フィールド分析レポート — Ten-Four Tracker</title>
<style>
/* Ten-Four Tracker — FIELD report (mobile-shaped, self-contained, print/export-friendly).
   No external font/CSS dependency: tokens inlined so the exported HTML/PNG render anywhere. */
:root{
  --bg:#eef1f5; --sheet:#ffffff; --panel:#ffffff; --panel2:#fbfcfe; --raise:#eef1f6;
  --line:#e6eaf0; --line2:#d3d9e2; --ink:#19212e; --ink2:#3a4658; --mut:#697587; --mut2:#9aa3b1;
  --accent:#5b6ef5; --blue:#2f73d8;
  --val:#15a05c; --pair:#b9892b; --draw:#3f6ad8; --air:#d6494f;
  --pos:#15a05c; --neg:#d6494f;
  --rg-empty:#eef1f6; --rg-ink:#1b2533;
  --warn:#8a6d1a; --warn-bg:#fbf3da; --warn-bd:#ecd9a3;
  --mono:'Inter',ui-sans-serif,system-ui,'Segoe UI',sans-serif;
  --sans:'Inter',ui-sans-serif,system-ui,-apple-system,'Segoe UI',Roboto,'Hiragino Kaku Gothic ProN','Meiryo',sans-serif;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{background:var(--bg);color:var(--ink);font:13px/1.5 var(--sans);font-variant-numeric:tabular-nums;-webkit-text-size-adjust:100%}
.num{font-family:var(--mono)}
.pos{color:var(--pos)} .neg{color:var(--neg)}
b{font-weight:700}

/* ---- export toolbar (screen only) ---- */
.r-toolbar{position:sticky;top:0;z-index:10;display:flex;align-items:center;gap:8px;flex-wrap:wrap;
  padding:10px 14px;background:rgba(255,255,255,.92);backdrop-filter:blur(6px);border-bottom:1px solid var(--line)}
.r-toolbar .tb-title{font-weight:800;font-size:13px;margin-right:auto;display:flex;align-items:center;gap:7px}
.r-toolbar .tb-title .logo{width:20px;height:20px;border-radius:6px;background:linear-gradient(135deg,#5b6ef5,#2f73d8);
  display:flex;align-items:center;justify-content:center;color:#fff;font-size:11px}
.btn{appearance:none;font:700 12px var(--sans);padding:8px 13px;border-radius:9px;cursor:pointer;border:1px solid var(--line2);
  background:#fff;color:var(--ink2);display:inline-flex;align-items:center;gap:6px;white-space:nowrap}
.btn:hover{border-color:var(--accent);color:var(--accent)}
.btn.primary{background:linear-gradient(135deg,#5b6ef5,#2f73d8);border-color:transparent;color:#fff}
.btn.primary:hover{filter:brightness(1.05);color:#fff}
.btn[disabled]{opacity:.5;cursor:default}
.tb-back{font:600 12px var(--sans);color:var(--mut);text-decoration:none;padding:7px 4px}
.tb-back:hover{color:var(--accent)}

/* ---- interactive chips (open-range + explorer, on screen + HTML export) ---- */
.chips{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.chip{font:600 11px var(--mono);padding:5px 10px;border-radius:8px;background:var(--raise);border:1px solid var(--line);
  color:var(--mut);cursor:pointer;user-select:none;white-space:nowrap}
.chip:hover{color:var(--ink2)}
.chip.on{background:rgba(91,110,245,.14);border-color:rgba(91,110,245,.4);color:var(--accent)}
.chip .nlabel{margin-left:5px;color:var(--mut2)}

/* ---- screen (interactive) vs print/capture (expanded static) layouts ---- */
.print-only{display:none}
body.capture .screen-only{display:none!important}
body.capture .print-only{display:block!important}

/* ---- the mobile sheet ---- */
.wrap{display:flex;justify-content:center;padding:18px 12px 40px}
.sheet{width:100%;max-width:412px;background:var(--sheet);border:1px solid var(--line);border-radius:18px;
  box-shadow:0 18px 50px -28px rgba(20,30,60,.4);padding:18px 16px 22px;overflow:hidden}

/* ---- report head ---- */
.r-head{display:flex;align-items:flex-start;gap:11px;margin-bottom:6px}
.r-head .mk{width:34px;height:34px;border-radius:10px;background:linear-gradient(135deg,#5b6ef5,#2f73d8);
  display:flex;align-items:center;justify-content:center;color:#fff;font-size:17px;flex-shrink:0}
.r-head h1{margin:0;font-size:17px;font-weight:800;letter-spacing:-.2px}
.r-head .sub{font-size:11px;color:var(--mut);font-weight:600;margin-top:1px}
.r-meta{display:flex;flex-wrap:wrap;gap:5px 7px;margin:11px 0 4px;font-size:10.5px}
.r-meta span{background:var(--raise);border:1px solid var(--line);border-radius:7px;padding:3px 8px;color:var(--mut);font-weight:600}
.r-meta b{color:var(--ink2);font-family:var(--mono)}
.banner{font-size:11px;line-height:1.5;color:var(--warn);background:var(--warn-bg);
  border:1px solid var(--warn-bd);border-left:3px solid var(--warn-bd);border-radius:11px;padding:9px 12px;margin:13px 0 4px}
.banner b{color:var(--warn)}

/* ---- section + panel ---- */
.sec{font-size:11px;font-weight:800;color:var(--mut);text-transform:uppercase;letter-spacing:1.1px;margin:22px 2px 9px;
  display:flex;align-items:center;gap:8px}
.sec::after{content:"";flex:1;height:1px;background:var(--line)}
.panel{background:var(--panel2);border:1px solid var(--line);border-radius:14px;padding:13px 13px;margin-bottom:12px;break-inside:avoid}
.panel .ph{display:flex;align-items:baseline;justify-content:space-between;gap:8px;margin-bottom:11px}
.panel .ph h3{margin:0;font-size:13px;font-weight:700}
.panel .ph .hint{font-size:10px;color:var(--mut2);font-weight:600}

/* ---- tiles ---- */
.tiles{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-top:13px}
.tile{background:var(--panel2);border:1px solid var(--line);border-radius:12px;padding:10px 12px}
.tile .k{font-size:10.5px;color:var(--mut);font-weight:600}
.tile .v{font-family:var(--mono);font-size:22px;font-weight:800;margin-top:4px;letter-spacing:-.5px}
.tile .sub{font-family:var(--mono);font-size:10px;color:var(--mut2);margin-top:2px}

/* ---- position stats table ---- */
table.pos{width:100%;border-collapse:collapse;font-size:11px;font-family:var(--mono)}
table.pos th{font-size:9.5px;color:var(--mut);font-weight:700;text-align:right;padding:5px 3px;border-bottom:1px solid var(--line2);white-space:nowrap}
table.pos td{text-align:right;padding:6px 3px;border-bottom:1px solid var(--line)}
table.pos th:first-child,table.pos td:first-child{text-align:left}
table.pos tr:last-child td{border-bottom:0}
table.pos td.lo{color:var(--mut2)}
.poschip{display:inline-flex;min-width:30px;justify-content:center;font:700 10px var(--mono);padding:2px 6px;border-radius:6px;
  background:var(--raise);border:1px solid var(--line2);color:var(--ink2)}

/* ---- 13x13 range grid ---- */
.gridwrap{margin-bottom:14px;break-inside:avoid}
.gridwrap .gl{display:flex;align-items:center;gap:7px;margin-bottom:6px;font-size:11px;color:var(--mut);font-weight:600}
.rangegrid{display:grid;grid-template-columns:repeat(13,1fr);gap:2px;max-width:330px;margin:0 auto}
.rg{aspect-ratio:1;border-radius:3px;display:flex;align-items:center;justify-content:center;
  font:700 7.5px var(--mono);color:var(--rg-ink);position:relative}
.rg small{position:absolute;bottom:0;right:1px;font-size:5.5px;opacity:.6;font-weight:600}

/* ---- labeled bars (action_ranges) ---- */
.dist{display:flex;flex-direction:column;gap:6px}
.distrow{display:grid;grid-template-columns:78px 1fr 34px;align-items:center;gap:8px;font-size:11px}
.distrow .lab{color:var(--ink2);font:600 10.5px var(--mono)}
.distrow .tr{height:13px;background:var(--rg-empty);border-radius:4px;overflow:hidden}
.distrow .tr i{display:block;height:100%;border-radius:4px}
.distrow .vv{text-align:right;font:700 10.5px var(--mono);color:var(--ink2)}
i.v{background:var(--val)} i.m{background:var(--pair)} i.a{background:var(--air)} i.d{background:var(--draw)}
.subhd{font-size:11px;font-weight:700;color:var(--ink2);margin:11px 0 6px;display:flex;justify-content:space-between}
.subhd:first-child{margin-top:0}
.subhd .nlabel{font:600 10px var(--mono);color:var(--mut2)}

/* ---- explorer: per-action composition rows ---- */
.erow{padding:7px 0;border-bottom:1px dashed var(--line)}
.erow:last-child{border-bottom:0}
.ehd{display:flex;align-items:baseline;gap:7px;margin-bottom:4px}
.ehd .ekey{font:700 11.5px var(--mono);color:var(--ink)}
.ehd .en{font:600 10px var(--mono);color:var(--mut2);margin-left:auto}
.cbar{display:flex;height:14px;border-radius:5px;overflow:hidden;background:var(--rg-empty)}
.cbar i{display:block;height:100%}
.cbar i.s-v{background:var(--val)} .cbar i.s-p{background:var(--pair)}
.cbar i.s-d{background:var(--draw)} .cbar i.s-a{background:var(--air)}
.enums{display:flex;gap:10px;margin-top:4px;font:700 10px var(--mono);flex-wrap:wrap}
.enums .cv{color:var(--val)} .enums .cp{color:var(--pair)} .enums .cd{color:var(--draw)} .enums .ca{color:var(--air)}
.clegend{display:flex;gap:11px;flex-wrap:wrap;font-size:10px;color:var(--mut);margin:2px 0 9px}
.clegend i{display:inline-block;width:9px;height:9px;border-radius:3px;margin-right:4px;vertical-align:-1px}

/* ---- explorer: detail heatmap ---- */
.matrix{width:100%;border-collapse:collapse;font-family:var(--mono);table-layout:fixed}
.matrix th{font-size:8px;font-weight:700;color:var(--mut);padding:3px 0 5px;text-align:center;line-height:1.15}
.matrix th.k,.matrix td.k{text-align:left;width:48px;font-size:9px}
.matrix th.n,.matrix td.n{width:26px;text-align:right;font-size:8.5px;color:var(--mut2);padding-right:3px}
.matrix td{font-size:8.5px;text-align:center;color:var(--ink2);padding:0;height:18px;border:1px solid #fff}
.matrix td.k{color:var(--ink);font-weight:700}
.matrix .grp{font-size:8px;color:var(--mut2);font-weight:700;text-align:center;padding-bottom:2px;letter-spacing:.3px}
.matrix .gV{color:var(--val)} .matrix .gP{color:var(--pair)} .matrix .gD{color:var(--draw)} .matrix .gA{color:var(--air)}

/* ---- notes / hints ---- */
.notes{display:flex;flex-direction:column;gap:8px}
.note{font-size:11px;line-height:1.5;color:var(--mut);padding:9px 11px;border:1px solid var(--line2);border-radius:10px;background:var(--panel)}
.note b{color:var(--ink2)} .note .nlabel{color:var(--mut2);font-size:10px;font-family:var(--mono)}
.note.exploit{border-color:rgba(91,110,245,.4);background:rgba(91,110,245,.05)}
.note.exploit b{color:var(--accent)}

.r-foot{margin-top:20px;padding-top:13px;border-top:1px solid var(--line);font-size:10px;color:var(--mut2);line-height:1.5}
.r-foot b{color:var(--mut)}

/* ---- print → PDF ---- */
@media print{
  @page{size:A4 portrait;margin:11mm 10mm}
  body{background:#fff}
  .r-toolbar{display:none!important}
  .screen-only{display:none!important}
  .print-only{display:block!important}
  .wrap{padding:0;display:block}
  .sheet{max-width:none;width:100%;border:0;border-radius:0;box-shadow:none;padding:0}
  .panel,.gridwrap,.tile{break-inside:avoid}
  .sec{break-after:avoid}
}
/* exported standalone html shares .wrap/.sheet; toolbar removed at export time */
body.exported .wrap{padding:16px 10px 32px}

/* FIELD report — renders the dashboard's フィールド tab as a mobile-shaped report.
   Two layouts share one DOM:
     • .screen-only — INTERACTIVE (open-range + Action×Range explorer with chips). Used on
       screen AND in the HTML export (which inlines this JS + data → works offline, buttons live).
     • .print-only  — STATIC EXPANDED (all positions, every action's per-category breakdown).
       Hidden on screen; shown for PDF (@media print) and PNG (body.capture toggle).
   The big-pot spotlight is removed. Explorer shows individual categories (2pair / set/trips /
   straight+ separately), never collapsed into a single "value". Any player names are stripped. */
"use strict";
const $ = (s, r = document) => r.querySelector(s);
const RANKS = "AKQJT98765432".split("");
const esc = (s) => String(s == null ? "" : s).replace(/[&<>]/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;" }[c]));
const pct = (p) => (p && p.pct != null ? p.pct + "%" : "–");
const tile = (k, v, sub) => `<div class="tile"><div class="k">${k}</div><div class="v">${v}</div><div class="sub">${sub || ""}</div></div>`;
const z = (x) => String(x).padStart(2, "0");
const cap = (s) => s[0].toUpperCase() + s.slice(1);
const ALABEL = (k) => k.replace("Bet:", "Bet ");
let LOADED = null; // {field, ex, meta} kept for the HTML export

function grid(dict, rgb) {
  const max = Math.max(1, ...Object.values(dict || {}));
  let g = "";
  for (let i = 0; i < 13; i++) for (let j = 0; j < 13; j++) {
    const code = i === j ? RANKS[i] + RANKS[i] : (i < j ? RANKS[i] + RANKS[j] + "s" : RANKS[j] + RANKS[i] + "o");
    const c = (dict || {})[code] || 0;
    const on = c > 0, a = on ? 0.16 + (c / max) * 0.72 : 0;
    const bg = on ? `rgba(${rgb},${a.toFixed(2)})` : "var(--rg-empty)";
    g += `<div class="rg" style="background:${bg}">${code}${on ? `<small>${c}</small>` : ""}</div>`;
  }
  return g;
}

// ---- explorer category coloring (value=green, pair=gold, draw=blue, air=red — same as live page) ----
const GROUPS = { V: ["straight+", "set/trips", "two pair"], P: ["pair"], D: ["pair+draw", "combo draw", "flush draw", "OESD", "gutshot"], A: ["air/overc"] };
const CATGRP = {}; for (const g in GROUPS) GROUPS[g].forEach((c) => (CATGRP[c] = g));
const CATCLS = { V: "v", P: "m", D: "d", A: "a" };
const CATABBR = { "straight+": "st+", "set/trips": "set", "two pair": "2p", "pair": "1p", "pair+draw": "p+d", "combo draw": "cd", "flush draw": "FD", "OESD": "OE", "gutshot": "gs", "air/overc": "air" };
const GHUE = { V: "21,160,92", P: "185,137,43", D: "63,106,216", A: "214,73,79" };
const SIZES = ["<33", "33-50", "50-75", "75-100", "100+"];

// ---- action_ranges labeled bars (river/turn bet, river call, 3bet) — mirrors live field tab ----
function rangeBars(obj, mapping) {
  const n = obj && obj.n, b = (obj && obj.buckets) || {};
  if (!n) return `<div class="distrow"><span class="lab">データなし</span><span class="tr"></span><span class="vv">0</span></div>`;
  return mapping.map(([key, label, cl]) => { const v = b[key] || 0; return `<div class="distrow"><span class="lab">${label}</span><span class="tr"><i class="${cl}" style="width:${v / n * 100}%"></i></span><span class="vv">${Math.round(v / n * 100)}%</span></div>`; }).join("");
}

// ============ INTERACTIVE explorer (ported from the live dashboard mountExplorer) ============
function mountExplorer(root, ex) {

  const distRows = (dist, n) => ex.cats.map((c) => [c, dist[c] || 0]).filter((x) => x[1] > 0).sort((a, b) => b[1] - a[1]).map(([c, v]) => [c, Math.round(v / n * 100), CATCLS[CATGRP[c]]]);

      if (!D.actions.find((a) => a.key === st.sel)) st.sel = (D.actions[0] || {}).key;
      const A = D.actions.find((a) => a.key === st.sel);
      let dist = A ? A.dist : {}, n = A ? A.n : 0, subLabel = "";
      if (A && RESP.has(A.key) && D.vs_size[A.key]) {
        const sizes = D.vs_size[A.key];

        if (st.sub && sizes[st.sub]) { dist = sizes[st.sub].dist; n = sizes[st.sub].n; subLabel = ` (vs ${st.sub}%)`; }
      } else { q("sub").innerHTML = ""; st.sub = null; }
      q("bars").innerHTML = barRows(distRows(dist, n || 1));
      q("read").innerHTML = `<b>${ALABEL(st.sel || "")}${subLabel}</b>（n=${n}）— 持っていた役・ドローのカテゴリ別内訳。`;

      q("sub").innerHTML = "";
      const counts = D.actions.map((a) => [a.key, a.dist[st.sel] || 0]);
      const tot = counts.reduce((s, x) => s + x[1], 0) || 1;
      q("bars").innerHTML = barRows(counts.filter((x) => x[1] > 0).map(([k, v]) => [ALABEL(k), Math.round(v / tot * 100), "d"]));

  draw();

// ============ STATIC EXPANDED explorer (per-category heatmaps, for PNG/PDF) ============
function heatmap(rows, ex) {
  const head = ex.cats.map((c) => `<th class="g${CATGRP[c]}">${CATABBR[c] || c}</th>`).join("");
  const body = rows.map((r) => {
    const tds = ex.cats.map((c) => {
      const v = r.n ? Math.round((r.dist[c] || 0) / r.n * 100) : 0;
      const al = v > 0 ? (0.1 + v / 100 * 0.66).toFixed(2) : 0;
      return `<td style="background:rgba(${GHUE[CATGRP[c]]},${al})">${v || ""}</td>`;
    }).join("");
    return `<tr><td class="k">${r.label}</td><td class="n">${r.n}</td>${tds}</tr>`;
  }).join("");
  return `<table class="matrix"><thead>
    <tr><th colspan="2"></th><th colspan="3" class="grp gV">2pair+</th><th colspan="1" class="grp gP">1ペア</th><th colspan="5" class="grp gD">ドロー</th><th colspan="1" class="grp gA">air</th></tr>
    <tr><th class="k"></th><th class="n">n</th>${head}</tr></thead><tbody>${body}</tbody></table>`;
}
function explorerExpanded(ex, st) {
  const D = ex.data[st]; if (!D) return "";
  const actRows = D.actions.filter((a) => a.n > 0).map((a) => ({ label: ALABEL(a.key), n: a.n, dist: a.dist }));
  let vss = "";
  for (const act of ["Call", "Fold"]) {
    const sizes = D.vs_size && D.vs_size[act]; if (!sizes) continue;
    const rows = SIZES.filter((s) => sizes[s] && sizes[s].n >= 20).map((s) => ({ label: "vs " + s + "%", n: sizes[s].n, dist: sizes[s].dist }));
    if (!rows.length) continue;
    vss += `<div class="subhd">${act === "Call" ? "コール" : "フォールド"}レンジ × 直面ベットサイズ</div>${heatmap(rows, ex)}`;
  }
  return `<div class="panel print-only"><div class="ph"><h3>${cap(st)}</h3><span class="hint">各アクションの役・ドロー（カテゴリ個別 %）</span></div>${heatmap(actRows, ex)}${vss}</div>`;
}

}

    <div class="sec">アクション × 相手レンジ エクスプローラー</div>

    <div class="nlabel screen-only" style="margin:0 2px 9px;font-size:10px">画面・HTMLはチップで切替。PNG/PDFは全アクションをカテゴリ別に一覧展開します。</div>
    <div class="panel screen-only" id="xint"></div>
    ${explorerExpandedHTML}

    <div class="r-foot">Ten-Four Tracker — フィールド分析レポート（スマホ表示・匿名化済み）<br>
    数値は母集団の暫定サンプルに基づきます。<b>${esc(meta.filter)}</b> / 生成 ${meta.generated}。プレイヤー名はプライバシー保護のため非表示。</div>`;

  // wire interactive controls
  const gint = $("#gridint");
  if (gint) gint.querySelector('[data-r="gridchips"]').onclick = (e) => {
    const c = e.target.closest(".chip"); if (!c) return;
    [...e.currentTarget.children].forEach((x) => x.classList.toggle("on", x === c));
    gint.querySelector('[data-r="fieldgrid"]').innerHTML = grid(d.grids[c.dataset.p], "47,115,216");
  };
  if ($("#xint")) mountExplorer($("#xint"), ex);
}

// ---------- exports ----------
function download(blob, name) {
  const u = URL.createObjectURL(blob); const a = document.createElement("a");
  a.href = u; a.download = name; document.body.appendChild(a); a.click(); a.remove();
  setTimeout(() => URL.revokeObjectURL(u), 1500);
}
function fname(ext) { const d = new Date(); return `tenfour-field-${d.getFullYear()}${z(d.getMonth() + 1)}${z(d.getDate())}-${z(d.getHours())}${z(d.getMinutes())}.${ext}`; }
function setBusy(b, label) {
  ["btn-png", "btn-pdf", "btn-html"].forEach((id) => { const e = $("#" + id); if (e) e.disabled = b; });
  const e = $("#btn-png"); if (e) e.textContent = b && label ? label : "🖼 PNG";
}
async function exportPNG() {
  setBusy(true, "生成中…");
  document.body.classList.add("capture");          // swap to the expanded (everything-listed) layout
  try {
    await new Promise((r) => requestAnimationFrame(() => requestAnimationFrame(r)));
    const node = $("#sheet");
    const canvas = await html2canvas(node, { scale: Math.min(3, (window.devicePixelRatio || 1) * 2), backgroundColor: "#ffffff", useCORS: true, logging: false, windowWidth: node.scrollWidth });
    document.body.classList.remove("capture");
    canvas.toBlob((b) => { if (b) download(b, fname("png")); setBusy(false); }, "image/png");
  } catch (e) { document.body.classList.remove("capture"); alert("PNG生成に失敗: " + e); setBusy(false); }
}
async function exportHTML() {
  setBusy(true);
  try {
    let css = "", js = "";
    try { css = await (await fetch("report.css")).text(); } catch (_) {}
    try { js = await (await fetch("report.js")).text(); } catch (_) {}
    const data = { field: Object.assign({}, LOADED.field, { big_pots: [] }), explorer: LOADED.ex, meta: LOADED.meta };
    const json = JSON.stringify(data).replace(/<\//g, "<\\/");
    const doc = `<!doctype html>\n<html lang="ja"><head><meta charset="utf-8">`
      + `<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">`
      + `<title>フィールド分析レポート — Ten-Four Tracker</title>\n<style>\n${css}\n</style></head>`
      + `<body class="exported"><div class="wrap"><div class="sheet" id="sheet"></div></div>`
      + `<script>window.__REPORT_DATA__=${json};<\/script>`
      + `<script>\n${js}\n<\/script></body></html>`;
    download(new Blob([doc], { type: "text/html;charset=utf-8" }), fname("html"));
  } finally { setBusy(false); }
}

// ---------- boot ----------
function filterLabel(q) {
  const parts = [];
  if (q.get("last_n") && q.get("last_n") !== "0") parts.push("直近" + Number(q.get("last_n")).toLocaleString() + "ハンド");
  if (q.get("date_from") || q.get("date_to")) parts.push((q.get("date_from") || "…") + "〜" + (q.get("date_to") || "…"));
  if (q.get("version")) parts.push(q.get("version") === "__none__" ? "version未記録" : "v" + q.get("version"));
  if (q.get("profile")) parts.push("profile:" + q.get("profile"));
  return parts.length ? parts.join(" / ") : "全期間 / 全データ";
}
async function boot() {
  const now = new Date();
  const generated = `${now.getFullYear()}-${z(now.getMonth() + 1)}-${z(now.getDate())} ${z(now.getHours())}:${z(now.getMinutes())}`;
  try {
    let field, ex, meta;
    if (window.__REPORT_DATA__) {
      field = window.__REPORT_DATA__.field; ex = window.__REPORT_DATA__.explorer;
      meta = window.__REPORT_DATA__.meta || { generated, filter: "全期間 / 全データ" };
    } else {
      const q = new URLSearchParams(location.search);
      const qs = q.toString() ? "?" + q.toString() : "";
      [field, ex] = await Promise.all([
        fetch("/analytics/field" + qs).then((r) => r.json()),
        fetch("/analytics/explorer").then((r) => r.json()),
      ]);
      meta = { generated, filter: filterLabel(q) };
    }
    sanitize(field);
    LOADED = { field, ex, meta };
    render(field, ex, meta);
  } catch (e) {
    $("#sheet").innerHTML = `<div style="padding:30px;color:#d6494f">読み込み失敗: ${esc(e.message || e)}<br><span style="color:#9aa3b1;font-size:12px">サーバー(:8765)が起動しているか確認してください。</span></div>`;
  }
  const png = $("#btn-png"), pdf = $("#btn-pdf"), html = $("#btn-html");
  if (png) png.onclick = exportPNG;
  if (pdf) pdf.onclick = () => window.print();
  if (html) html.onclick = exportHTML;
}
boot();

</script></body></html>
